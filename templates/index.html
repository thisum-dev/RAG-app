<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chat — Ask Your Documents</title>
  <style>
    /* ── Reset & base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f111a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 40px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #6366f1, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 28px;
    }

    /* ── Card wrapper ──────────────────────────────────────────────── */
    .card {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 760px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* ── Upload section ────────────────────────────────────────────── */
    .upload-section {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .upload-section label {
      font-size: 0.85rem;
      color: #94a3b8;
      font-weight: 500;
    }

    #pdf-file {
      flex: 1;
      min-width: 180px;
      background: #0f111a;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      padding: 8px 12px;
      font-size: 0.85rem;
    }

    #upload-btn {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #upload-btn:hover  { opacity: 0.85; }
    #upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #upload-status {
      width: 100%;
      font-size: 0.82rem;
      margin-top: 4px;
      min-height: 18px;
    }
    .status-ok  { color: #34d399; }
    .status-err { color: #f87171; }

    /* ── Chat window ───────────────────────────────────────────────── */
    .section-label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #475569;
      margin-bottom: 10px;
      font-weight: 600;
    }

    #chat-window {
      background: #0f111a;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 16px;
      height: 380px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 16px;
      scroll-behavior: smooth;
    }

    /* ── Individual messages ───────────────────────────────────────── */
    .msg { display: flex; flex-direction: column; max-width: 82%; gap: 4px; }

    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.bot   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.92rem;
      line-height: 1.55;
      word-break: break-word;
    }

    .msg.user .bubble  {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: #1e2130;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    /* Sources accordion */
    .sources-toggle {
      font-size: 0.75rem;
      color: #6366f1;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-align: left;
      margin-top: 2px;
    }
    .sources-toggle:hover { text-decoration: underline; }

    .sources-list {
      display: none;
      background: #0f111a;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 6px;
      font-size: 0.78rem;
      color: #94a3b8;
      line-height: 1.5;
    }
    .sources-list.open { display: block; }
    .sources-list li { margin-bottom: 6px; list-style: disc; margin-left: 14px; }

    /* Loading indicator */
    .typing { display: flex; align-items: center; gap: 6px; padding: 10px 14px; }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #6366f1;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%           { transform: translateY(-6px); }
    }

    /* ── Input row ─────────────────────────────────────────────────── */
    .input-row {
      display: flex;
      gap: 10px;
    }

    #user-input {
      flex: 1;
      background: #0f111a;
      border: 1px solid #2d3148;
      border-radius: 10px;
      color: #e2e8f0;
      padding: 10px 14px;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #user-input:focus  { border-color: #6366f1; }
    #user-input::placeholder { color: #475569; }

    #send-btn {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #send-btn:hover    { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Divider ───────────────────────────────────────────────────── */
    .divider {
      height: 1px;
      background: #2d3148;
      margin: 20px 0;
    }

    /* ── Scrollbar styling ─────────────────────────────────────────── */
    #chat-window::-webkit-scrollbar        { width: 5px; }
    #chat-window::-webkit-scrollbar-track  { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb  { background: #2d3148; border-radius: 4px; }
  </style>
</head>
<body>

  <h1>📄 RAG Chat</h1>
  <p class="subtitle">Upload a PDF, then ask questions about it.</p>

  <div class="card">

    <!-- ─── Upload section ───────────────────────────────────────── -->
    <div class="section-label">1 · Upload Document</div>
    <div class="upload-section">
      <label for="pdf-file">PDF file:</label>
      <input type="file" id="pdf-file" accept=".pdf" />
      <button id="upload-btn">Upload &amp; Index</button>
    </div>
    <div id="upload-status"></div>

    <div class="divider"></div>

    <!-- ─── Chat section ─────────────────────────────────────────── -->
    <div class="section-label">2 · Ask Your Document</div>
    <div id="chat-window">
      <!-- Messages injected by script.js -->
    </div>

    <div class="input-row">
      <input
        type="text"
        id="user-input"
        placeholder="Ask something about your document…"
        autocomplete="off"
      />
      <button id="send-btn">Send</button>
    </div>

  </div><!-- /.card -->

  <script src="/static/script.js"></script>
</body>
</html>
